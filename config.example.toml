# bragent example configuration. Copy to config.toml and customise.

[brand]
name = "Acme Outdoor"
domain = "shop.acme-outdoor.example"
logo_url = "https://shop.acme-outdoor.example/logo.png"
# Opt in to brand-rights signing (M6.1). When set, bragent registers
# verify_brand_claim in capabilities and publishes its public key at
# /.well-known/jwks.json. The first boot mints an Ed25519 keypair at
# this path with mode 0600. Leave empty to disable.
signing_key_path = ".cache/signing.ed25519"

[server]
listen = ":8080"

[feed]
# Use file:// for local testing, http(s):// for production catalogues.
url = "file://./feeds/example.json"
format = "json"
cache_path = ".cache/feed.json"
refresh_interval = "30m"

# OpenAI-compatible LLM endpoint used by si_send_message.
# Leave [llm].endpoint empty (or omit the section) to use the offline mock
# responder — that's what --simulate-host and CI rely on.
#
# Uncomment to point at a real OpenAI-compatible server. Tested wire shape:
# Ollama (http://localhost:11434/v1), llama.cpp server, vLLM, OpenAI proper.
# Leave api_key empty for unauthenticated local models.
[llm]
endpoint = ""
api_key = ""
model = ""

# Example: local Ollama
# [llm]
# endpoint = "http://localhost:11434/v1"
# api_key = ""
# model = "llama3.2"

# Optional admin UI at /admin/ — product CRUD on the file:// feed plus an
# in-process chat panel for testing. Off by default. To enable, flip
# `enabled = true` AND set a non-empty `token`. An enabled-without-token
# config silently disables the surface (safe-fail). Token-gated via the
# X-Admin-Token header on every request; the JS bootstraps from a one-time
# `?token=...` query param. Public well-knowns and /mcp stay unauth.
[admin]
enabled = false
token = ""
