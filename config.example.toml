# bragent example configuration. Copy to config.toml and customise.

[brand]
name = "Acme Outdoor"
domain = "shop.acme-outdoor.example"
logo_url = "https://shop.acme-outdoor.example/logo.png"
# Opt in to brand-rights signing (M6.1) AND M6.3 receipt notarisation.
# When set, bragent registers verify_brand_claim in capabilities,
# publishes its public key at /.well-known/jwks.json, AND uses the same
# Ed25519 key to JWS-sign every sponsored_context_receipt it persists —
# so the audit trail is cryptographically attestable, not just two
# unsigned JSON blobs (Ghost's M6.3 veto on unsigned audit). First boot
# mints a fresh keypair at this path with mode 0600. Leave empty to
# disable both surfaces; receipts persist unsigned in that case.
signing_key_path = ".cache/signing.ed25519"

# M6.3 disclosure obligation defaults stamped onto every emitted
# sponsored_context envelope (AdCP 3.1.0-rc.14 §Sponsored Context
# Accountability). Omit the section entirely to ship sensible defaults
# (required=false, label_text="Sponsored by <name>",
# timing=at_first_influenced_output, proximity=near_influenced_output,
# jurisdictions=[]).
#
# A host that receives a sponsored_context with required=true MUST
# either accept and commit to render the disclosure (label_text) or
# reject the context entirely — silent down-scoping is forbidden by
# spec and bragent enforces it on incoming receipts.
[brand.disclosure]
required = false
# label_text = "Sponsored by Acme Outdoor"
# timing = "at_first_influenced_output"
# proximity = "near_influenced_output"
# jurisdictions = [
#   { country = "US", regulation = "FTC-16-CFR-Part-255" },
#   { country = "DE", regulation = "EU-DSA-Art-26" },
# ]

[server]
listen = ":8080"

[feed]
# Use file:// for local testing, http(s):// for production catalogues.
url = "file://./feeds/example.json"
format = "json"
cache_path = ".cache/feed.json"
refresh_interval = "30m"

# OpenAI-compatible LLM endpoint used by si_send_message.
# Leave [llm].endpoint empty (or omit the section) to use the offline mock
# responder — that's what --simulate-host and CI rely on.
#
# Uncomment to point at a real OpenAI-compatible server. Tested wire shape:
# Ollama (http://localhost:11434/v1), llama.cpp server, vLLM, OpenAI proper.
# Leave api_key empty for unauthenticated local models.
[llm]
endpoint = ""
api_key = ""
model = ""

# Example: local Ollama
# [llm]
# endpoint = "http://localhost:11434/v1"
# api_key = ""
# model = "llama3.2"

# Optional admin UI at /admin/ — product CRUD on the file:// feed plus an
# in-process chat panel for testing. Off by default. To enable, flip
# `enabled = true` AND set a non-empty `token`. An enabled-without-token
# config silently disables the surface (safe-fail). Token-gated via the
# X-Admin-Token header on every request; the JS bootstraps from a one-time
# `?token=...` query param. Public well-knowns and /mcp stay unauth.
[admin]
enabled = false
token = ""

# Optional public /demo/ panel — zero-token conformance demo for the
# AdCP SI WG audience. When enabled, anyone with the URL can chat
# with the brand agent and watch the sponsored_context envelope +
# auto-synthesised receipt land on the wire panel. Sessions live
# in process memory only — restart wipes them. BYOK supported for
# Anthropic / OpenAI / Groq / DeepSeek (endpoint whitelist enforced
# server-side; mock LLM fallback when no key is supplied). Catalog
# is read-only on /demo/; only /admin/ mutates the feed.
#
# Off by default. On Fly we flip via BRAGENT_DEMO_ENABLED=true in
# fly.toml so the published demo URL stays separate from a brand's
# own production deploy.
[demo]
enabled = false
