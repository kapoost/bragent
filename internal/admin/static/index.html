<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>bragent admin</title>
  <style>
    :root {
      --bg: #0f1115;
      --panel: #1a1d24;
      --panel-2: #232730;
      --fg: #e5e7eb;
      --fg-dim: #9ca3af;
      --accent: #60a5fa;
      --accent-2: #34d399;
      --warn: #f59e0b;
      --error: #f87171;
      --border: #2d323d;
      --radius: 6px;
      --mono: ui-monospace, "JetBrains Mono", Menlo, monospace;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--fg); }
    header { padding: 12px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    header h1 { margin: 0; font-size: 16px; font-weight: 600; }
    header .brand { color: var(--fg-dim); font-size: 13px; }
    header .status { font-family: var(--mono); font-size: 12px; color: var(--fg-dim); }
    main { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--border); height: calc(100vh - 49px); }
    section { background: var(--bg); overflow: hidden; display: flex; flex-direction: column; }
    section h2 { margin: 0; padding: 12px 20px; font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; color: var(--fg-dim); border-bottom: 1px solid var(--border); }
    .scroll { flex: 1; overflow-y: auto; padding: 16px 20px; }
    .product { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; margin-bottom: 10px; }
    .product .row { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
    .product .id { font-family: var(--mono); font-size: 11px; color: var(--fg-dim); }
    .product .name { font-weight: 600; font-size: 14px; }
    .product .desc { color: var(--fg-dim); font-size: 13px; margin-top: 4px; }
    .product .meta { font-family: var(--mono); font-size: 12px; color: var(--accent-2); margin-top: 6px; display: flex; gap: 12px; }
    .product .meta .unavail { color: var(--warn); }
    .product button.del { background: transparent; color: var(--error); border: 1px solid var(--border); border-radius: 4px; padding: 2px 8px; font-size: 11px; cursor: pointer; }
    .product button.del:hover { background: var(--panel-2); }
    form.add { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 14px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    form.add label { font-size: 11px; color: var(--fg-dim); text-transform: uppercase; letter-spacing: 0.04em; display: flex; flex-direction: column; gap: 4px; }
    form.add label.wide { grid-column: span 2; }
    form.add input, form.add textarea { background: var(--bg); border: 1px solid var(--border); border-radius: 4px; padding: 6px 8px; color: var(--fg); font-family: inherit; font-size: 13px; }
    form.add textarea { resize: vertical; min-height: 50px; font-family: inherit; }
    form.add button[type="submit"] { grid-column: span 2; background: var(--accent); color: #0b0d10; border: none; border-radius: 4px; padding: 8px 12px; font-weight: 600; cursor: pointer; }
    form.add button[type="submit"]:hover { filter: brightness(1.1); }
    form.add button[type="submit"]:disabled { background: var(--panel-2); color: var(--fg-dim); cursor: not-allowed; }
    form.add .form-toolbar { grid-column: span 2; display: flex; gap: 6px; margin-bottom: 4px; }
    form.add button.ghost { background: transparent; color: var(--fg-dim); border: 1px solid var(--border); border-radius: 4px; padding: 4px 10px; font-size: 11px; cursor: pointer; }
    form.add button.ghost:hover { color: var(--fg); border-color: var(--accent); }
    form.add button.ghost:disabled { color: var(--border); cursor: not-allowed; border-color: var(--border); }
    .readonly-banner { background: var(--panel-2); border: 1px solid var(--warn); color: var(--warn); padding: 10px 12px; border-radius: var(--radius); font-size: 13px; margin-bottom: 14px; }
    .chat-log { flex: 1; overflow-y: auto; padding: 16px 20px; }
    .turn { margin-bottom: 14px; max-width: 80%; }
    .turn.host { margin-left: auto; }
    .turn.brand { margin-right: auto; }
    .turn .role { font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--fg-dim); margin-bottom: 3px; }
    .turn .bubble { padding: 10px 14px; border-radius: 14px; font-size: 14px; line-height: 1.45; }
    .turn.host .bubble { background: var(--accent); color: #0b0d10; }
    .turn.brand .bubble { background: var(--panel); border: 1px solid var(--border); }
    .turn .handoff { font-family: var(--mono); font-size: 11px; color: var(--accent-2); margin-top: 6px; word-break: break-all; }
    .status-line { font-family: var(--mono); font-size: 11px; color: var(--fg-dim); padding: 0 20px 8px; }
    .status-line.handoff { color: var(--accent-2); }
    .status-line.terminated { color: var(--error); }
    form.chat { display: flex; gap: 8px; padding: 12px 20px; border-top: 1px solid var(--border); }
    form.chat input { flex: 1; background: var(--panel); border: 1px solid var(--border); border-radius: 4px; padding: 8px 10px; color: var(--fg); font-family: inherit; font-size: 14px; }
    form.chat button { background: var(--accent-2); color: #0b0d10; border: none; border-radius: 4px; padding: 8px 16px; font-weight: 600; cursor: pointer; }
    form.chat button:hover { filter: brightness(1.1); }
    form.chat button:disabled { background: var(--panel-2); color: var(--fg-dim); cursor: not-allowed; }
    .empty { color: var(--fg-dim); font-size: 13px; text-align: center; padding: 40px 0; }
    .toolbar { display: flex; gap: 6px; padding: 10px 20px 0; }
    .toolbar button { background: var(--panel); color: var(--fg-dim); border: 1px solid var(--border); border-radius: 4px; padding: 4px 10px; font-size: 11px; cursor: pointer; }
    .toolbar button:hover { color: var(--fg); }
  </style>
</head>
<body>
  <header>
    <div><h1>bragent admin</h1><span class="brand" id="brand-name">—</span></div>
    <div class="status" id="health">…</div>
  </header>
  <main>
    <section>
      <h2>Catalog</h2>
      <div class="scroll" id="catalog-pane">
        <div id="readonly-banner" class="readonly-banner" style="display:none">
          Feed source is read-only (not a <code>file://</code> URL). CRUD disabled — edits would not persist.
        </div>
        <form class="add" id="add-form" autocomplete="off" onsubmit="return false">
          <div class="form-toolbar">
            <button type="button" id="fill-example" class="ghost">Fill with example</button>
            <button type="button" id="clear-form" class="ghost">Clear</button>
          </div>
          <label class="wide">ID
            <input name="id" required pattern="[a-z0-9_-]+" placeholder="compass-magnetic" data-example="compass-magnetic">
          </label>
          <label class="wide">Name
            <input name="name" required placeholder="Acme Magnetic Compass" data-example="Acme Magnetic Compass">
          </label>
          <label class="wide">Description
            <textarea name="description" placeholder="Steel-needle compass with luminescent bezel." data-example="Steel-needle compass with luminescent bezel."></textarea>
          </label>
          <label>Price
            <input name="price" type="number" step="0.01" min="0" placeholder="29.00" data-example="29.00">
          </label>
          <label>Currency
            <input name="currency" placeholder="USD" value="USD" data-example="USD">
          </label>
          <label class="wide">URL
            <input name="url" type="url" placeholder="https://shop.acme-outdoor.example/p/compass-magnetic" data-example="https://shop.acme-outdoor.example/p/compass-magnetic">
          </label>
          <label class="wide">Tags (comma-separated)
            <input name="tags" placeholder="navigation, compass, hiking" data-example="navigation, compass, hiking">
          </label>
          <label class="wide">
            <input name="available" type="checkbox" checked> Available
          </label>
          <button type="submit">Save product</button>
        </form>
        <div id="products"></div>
      </div>
    </section>
    <section>
      <h2>Chat with brand agent</h2>
      <div class="toolbar">
        <button id="reset-chat" type="button">New session</button>
        <span class="status" id="session-status" style="color:var(--fg-dim);font-family:var(--mono);font-size:11px;padding:4px 0">no session</span>
      </div>
      <div class="chat-log" id="chat-log">
        <div class="empty">Ask the brand agent about a product, or signal buy intent to see the handoff.</div>
      </div>
      <div id="status-line" class="status-line"></div>
      <form class="chat" id="chat-form" onsubmit="return false">
        <input id="chat-input" placeholder="How heavy is the tent?" autocomplete="off" required>
        <button type="submit" id="send-btn">Send</button>
      </form>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
